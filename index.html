<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi KKN KEPUH</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-active { border-bottom: 3px solid #10B981; color: #10B981; font-weight: 700; }
        .tab-inactive { border-bottom: 3px solid transparent; color: #6B7280; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <!-- Header Interactive -->
    <header class="group relative bg-slate-900 text-white shadow-lg overflow-hidden transition-all duration-700 ease-in-out h-44 hover:h-[500px] sm:hover:h-[600px] cursor-pointer">
        <div class="absolute inset-0 bg-cover bg-center transition-all duration-700 group-hover:scale-105" style="background-image: url('header-kkn.jpeg'); background-position: center 30%;"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/60 to-slate-900/30 group-hover:bg-slate-900/30 transition-all duration-700"></div>

        <div class="relative max-w-2xl mx-auto px-6 pt-6 pb-12 text-center sm:text-left flex flex-col sm:flex-row items-center justify-between gap-4 h-full z-10">
            <div>
                <span class="inline-block px-3 py-1 bg-white/20 backdrop-blur-md rounded-full text-xs font-semibold mb-2">KKN DUSUN KEPUH 2026</span>
                <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight drop-shadow-md">PRESENSI KKN KEPUH</h1>
            </div>
            <div class="hidden sm:block text-right">
                <p class="text-xs text-slate-300">Tanggal Hari Ini</p>
                <p id="current-date" class="font-bold text-sm drop-shadow-md"></p>
            </div>
        </div>

        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 z-20 opacity-60 group-hover:opacity-0 transition-opacity duration-300">
            <i data-lucide="chevron-down" class="w-5 h-5 text-white animate-bounce"></i>
        </div>
    </header>

    <!-- Container Utama -->
    <main class="max-w-2xl mx-auto px-4 py-6">

        <!-- Navigation Tabs -->
        <div class="flex border-b border-slate-200 mb-6 bg-white rounded-t-xl overflow-hidden shadow-sm">
            <button id="tab-member" class="tab-active flex-1 py-3 text-center transition-all flex items-center justify-center gap-2" onclick="switchTab('member')">
                <i data-lucide="user-check" class="w-4 h-4"></i> Presensi Anggota
            </button>
            <button id="tab-admin" class="tab-inactive flex-1 py-3 text-center transition-all flex items-center justify-center gap-2" onclick="switchTab('admin')">
                <i data-lucide="shield-check" class="w-4 h-4"></i> Panel Admin
            </button>
        </div>

        <!-- ================= Halaman Anggota ================= -->
        <section id="view-member" class="space-y-4">
            <form id="attendance-form" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                <div>
                    <label class="block mb-1.5 font-medium text-slate-700 text-sm">Nama Lengkap<span class="text-red-500">*</span></label>
                    <input id="input-name" type="text" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 outline-none text-sm" required>
                </div>

                <div>
                    <label class="block mb-1.5 font-medium text-slate-700 text-sm">Status Kehadiran <span class="text-red-500">*</span></label>
                    <select id="input-status" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 outline-none text-sm bg-white" required>
                        <option value="Hadir">Hadir</option>
                        <option value="Izin">Izin</option>
                        <option value="Sakit">Sakit</option>
                    </select>
                </div>

                <div>
                    <label class="block mb-1.5 font-medium text-slate-700 text-sm">
                        Unggah Foto<span class="text-red-500">* </span>
                    </label>
                    <input id="input-photo" type="file" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-emerald-50 file:text-emerald-700 cursor-pointer border border-slate-200 rounded-xl" required>
                    
                    <div id="photo-preview-container" class="hidden mt-3 relative w-24 h-24 rounded-xl border border-slate-200 overflow-hidden">
                        <img id="photo-preview" src="" class="w-full h-full object-cover">
                        <button type="button" onclick="removePhoto()" class="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 shadow">
                            <i data-lucide="x" class="w-3 h-3"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block mb-1.5 font-medium text-slate-700 text-sm">Keterangan</label>
                    <textarea id="input-note" rows="2" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 outline-none text-sm"></textarea>
                </div>

                <button id="submit-btn" type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-semibold shadow-md transition-all flex items-center justify-center gap-2">
                    <i data-lucide="send" class="w-4 h-4"></i> Kirim
                </button>
            </form>

            <div id="status-msg" class="hidden p-4 rounded-xl text-center text-sm font-medium"></div>
        </section>

        <!-- ================= Halaman Admin ================= -->
        <section id="view-admin" class="hidden space-y-5">
            
            <!-- Lock Screen PIN Admin -->
            <div id="pin-gate" class="text-center py-10 bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
                <div class="inline-flex p-3 bg-blue-50 text-blue-800 rounded-full mb-3">
                    <i data-lucide="lock" class="w-6 h-6"></i>
                </div>
                <h3 class="font-bold text-slate-800 text-lg">Akses Panel Admin</h3>
                <p class="text-xs text-slate-500 mb-4">Masukkan PIN 4 angka untuk mengelola data</p>
                <div class="flex items-center justify-center gap-2 max-w-xs mx-auto">
                    <input id="pin-input" type="password" maxlength="4" placeholder="••••" class="w-32 text-center border border-slate-200 rounded-xl px-3 py-2 text-lg tracking-widest focus:ring-2 focus:ring-blue-600 outline-none">
                    <button onclick="checkPin()" class="px-4 py-2.5 bg-slate-900 text-white rounded-xl font-medium hover:bg-slate-800 transition">Masuk</button>
                </div>
                <p id="pin-error" class="hidden text-red-500 text-xs mt-2 font-medium">⚠️ PIN Salah!</p>
            </div>

            <!-- Dashboard Admin -->
            <div id="admin-panel" class="hidden space-y-5">
                
                <div class="flex items-center justify-between bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="flex items-center gap-2">
                        <i data-lucide="shield-check" class="w-5 h-5 text-emerald-600"></i>
                        <span class="font-bold text-slate-800 text-sm">Mode Administrator</span>
                    </div>
                    <button onclick="logoutAdmin()" class="flex items-center gap-1.5 px-3 py-1.5 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl text-xs font-semibold transition">
                        <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Keluar / Logout
                    </button>
                </div>

                <!-- Cards Statistik -->
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-center">
                        <p class="text-xs font-semibold text-slate-400 uppercase">Total Entri</p>
                        <p id="stat-total" class="text-2xl font-black text-slate-800 mt-1">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-center">
                        <p class="text-xs font-semibold text-slate-400 uppercase">Hadir</p>
                        <p id="stat-hadir" class="text-2xl font-black text-emerald-600 mt-1">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-center">
                        <p class="text-xs font-semibold text-slate-400 uppercase">Izin/Sakit</p>
                        <p id="stat-izin" class="text-2xl font-black text-amber-600 mt-1">0</p>
                    </div>
                </div>

                <!-- Tombol Ekspor -->
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="exportExcel()" class="flex items-center justify-center gap-2 py-2.5 bg-emerald-700 hover:bg-emerald-800 text-white rounded-xl text-xs font-semibold shadow-sm transition">
                        <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> Ekspor Excel (.xls)
                    </button>
                    <button onclick="exportPDF()" class="flex items-center justify-center gap-2 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-xl text-xs font-semibold shadow-sm transition">
                        <i data-lucide="printer" class="w-4 h-4"></i> Cetak PDF Laporan
                    </button>
                </div>

                <!-- Daftar Rekap -->
                <div class="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm">
                    <h3 class="font-bold text-slate-800 text-sm mb-3">Daftar Presensi Terkini</h3>
                    <div id="records-empty" class="text-center py-8 text-slate-400 text-xs">
                        Belum ada data presensi yang masuk.
                    </div>
                    <div id="records-list" class="space-y-3"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Foto Full -->
    <div id="image-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" onclick="closeModal()">
        <div class="relative max-w-lg w-full bg-white rounded-2xl overflow-hidden shadow-2xl">
            <img id="modal-img" src="" class="w-full max-h-[80vh] object-contain bg-slate-900">
        </div>
    </div>

    <!-- JavaScript LOGIC -->
    <script>
        const ADMIN_PIN = "2007";

        let records = JSON.parse(localStorage.getItem('kkn_records_db')) || [];
        let currentPhotoBase64 = "";

        // Format Tanggal Hari Ini
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', {
            weekday: 'long', day: 'numeric', month: 'short', year: 'numeric'
        });

        // Tab Switching Logic
        function switchTab(tab) {
            const memberTab = document.getElementById('tab-member');
            const adminTab = document.getElementById('tab-admin');
            const memberView = document.getElementById('view-member');
            const adminView = document.getElementById('view-admin');

            if (tab === 'member') {
                memberTab.className = 'tab-active flex-1 py-3 text-center transition-all flex items-center justify-center gap-2';
                adminTab.className = 'tab-inactive flex-1 py-3 text-center transition-all flex items-center justify-center gap-2';
                memberView.classList.remove('hidden');
                adminView.classList.add('hidden');
            } else {
                adminTab.className = 'tab-active flex-1 py-3 text-center transition-all flex items-center justify-center gap-2';
                memberTab.className = 'tab-inactive flex-1 py-3 text-center transition-all flex items-center justify-center gap-2';
                adminView.classList.remove('hidden');
                memberView.classList.add('hidden');
            }
        }

        // Kompres Gambar Foto Bukti
        document.getElementById('input-photo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height, maxDim = 400;
                    if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; }
                    else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('photo-preview').src = currentPhotoBase64;
                    document.getElementById('photo-preview-container').classList.remove('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function removePhoto() {
            currentPhotoBase64 = "";
            document.getElementById('input-photo').value = "";
            document.getElementById('photo-preview-container').classList.add('hidden');
        }

        // Submit Form Presensi
        document.getElementById('attendance-form').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!currentPhotoBase64) {
                alert("⚠️ Foto bukti kegiatan wajib diunggah!");
                return;
            }

            const now = new Date();
            const newRecord = {
                id: Date.now(),
                name: document.getElementById('input-name').value.trim(),
                status: document.getElementById('input-status').value,
                note: document.getElementById('input-note').value.trim(),
                photo: currentPhotoBase64,
                date: now.toLocaleDateString('id-ID'),
                time: now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })
            };

            records.unshift(newRecord);
            localStorage.setItem('kkn_records_db', JSON.stringify(records));

            this.reset();
            removePhoto();

            const statusMsg = document.getElementById('status-msg');
            statusMsg.className = "p-4 bg-emerald-100 border border-emerald-300 text-emerald-900 rounded-xl text-center text-sm font-medium mt-4";
            statusMsg.textContent = "✅ Presensi berhasil dikirim! Terima kasih.";
            statusMsg.classList.remove('hidden');
            setTimeout(() => statusMsg.classList.add('hidden'), 4000);

            renderAdminData();
        });

        // Verifikasi PIN Admin
        function checkPin() {
            const pin = document.getElementById('pin-input').value;
            if (pin === ADMIN_PIN) {
                document.getElementById('pin-gate').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('pin-input').value = '';
                document.getElementById('pin-error').classList.add('hidden');
                renderAdminData();
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
            }
        }

        // Logout Admin
        function logoutAdmin() {
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('pin-gate').classList.remove('hidden');
        }

        // Render Data Presensi
        function renderAdminData() {
            document.getElementById('stat-total').textContent = records.length;
            document.getElementById('stat-hadir').textContent = records.filter(r => r.status === 'Hadir').length;
            document.getElementById('stat-izin').textContent = records.filter(r => r.status !== 'Hadir').length;

            const listEl = document.getElementById('records-list');
            const emptyEl = document.getElementById('records-empty');

            if (records.length === 0) {
                emptyEl.classList.remove('hidden');
                listEl.innerHTML = '';
                return;
            }

            emptyEl.classList.add('hidden');
            listEl.innerHTML = records.map((r) => `
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 flex items-center justify-between gap-3">
                    <div class="flex items-center gap-3">
                        ${r.photo 
                            ? `<img src="${r.photo}" onclick="openModal('${r.photo}')" class="w-10 h-10 rounded-lg object-cover border border-slate-300 cursor-pointer hover:opacity-80">`
                            : `<div class="w-10 h-10 rounded-lg bg-slate-200 flex items-center justify-center text-slate-400"><i data-lucide="user" class="w-5 h-5"></i></div>`
                        }
                        <div>
                            <h4 class="font-bold text-slate-800 text-xs">${r.name}</h4>
                            <p class="text-[10px] text-slate-500">${r.date} • ${r.time} ${r.note ? '• ' + r.note : ''}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="px-2 py-0.5 rounded text-[10px] font-bold ${
                            r.status === 'Hadir' ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800'
                        }">${r.status}</span>
                        <button onclick="deleteRecord(${r.id})" class="text-red-400 hover:text-red-600 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        }

        // Hapus Data Presensi
        function deleteRecord(id) {
            if (confirm("Hapus data presensi ini?")) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('kkn_records_db', JSON.stringify(records));
                renderAdminData();
            }
        }

        // Modal Foto Full
        function openModal(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('image-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('image-modal').classList.add('hidden'); }

        // Export ke Excel (Termasuk Gambar Foto Bukti)
        function exportExcel() {
            if (records.length === 0) return alert('Belum ada data untuk diekspor!');

            let table = `<table border="1" style="border-collapse: collapse; text-align: center;">
                <tr style="background-color: #0f172a; color: white;">
                    <th>No</th>
                    <th>Foto Bukti</th>
                    <th>Nama</th>
                    <th>Status</th>
                    <th>Tanggal</th>
                    <th>Waktu</th>
                    <th>Keterangan</th>
                </tr>`;

            records.forEach((r, i) => {
                const imgTag = r.photo ? `<img src="${r.photo}" width="80" height="80" style="object-fit: cover;">` : '-';
                table += `<tr>
                    <td>${i + 1}</td>
                    <td style="padding: 5px;">${imgTag}</td>
                    <td>${r.name}</td>
                    <td>${r.status}</td>
                    <td>${r.date}</td>
                    <td>${r.time}</td>
                    <td>${r.note || '-'}</td>
                </tr>`;
            });
            table += `</table>`;

            const blob = new Blob([`\ufeff${table}`], { type: 'application/vnd.ms-excel' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Laporan_Presensi_KKN_${new Date().toISOString().split('T')[0]}.xls`;
            a.click();
        }

        // Print PDF (Termasuk Gambar Foto Bukti)
        function exportPDF() {
            if (records.length === 0) return alert('Belum ada data untuk dicetak!');
            const printWin = window.open('', '_blank');
            let content = `
                <html><head><title>Laporan Presensi KKN KEPUH</title>
                <style>
                    body { font-family: Arial; padding: 20px; }
                    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
                    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 11px; vertical-align: middle; }
                    th { background: #0f172a; color: white; }
                    img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
                </style></head><body>
                <h2>REKAP PRESENSI KKN KEPUH</h2>
                <p>Tanggal Cetak: ${new Date().toLocaleString('id-ID')}</p>
                <table>
                    <tr>
                        <th>No</th>
                        <th>Foto Bukti</th>
                        <th>Nama</th>
                        <th>Status</th>
                        <th>Tanggal</th>
                        <th>Waktu</th>
                        <th>Keterangan</th>
                    </tr>
            `;
            records.forEach((r, i) => {
                const imgTag = r.photo ? `<img src="${r.photo}">` : '-';
                content += `<tr>
                    <td>${i + 1}</td>
                    <td>${imgTag}</td>
                    <td>${r.name}</td>
                    <td>${r.status}</td>
                    <td>${r.date}</td>
                    <td>${r.time}</td>
                    <td>${r.note || '-'}</td>
                </tr>`;
            });
            content += `</table></body></html>`;

            printWin.document.write(content);
            printWin.document.close();
            printWin.print();
        }

        lucide.createIcons();
    </script>
</body>
</html>
